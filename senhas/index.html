/* Fundo da página com degradê moderno */
body {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    color: #f8fafc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Caixa principal do gerador (Card) */
.container {
    background-color: #1e293b;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    max-width: 440px;
    width: 100%;
    text-align: center;
    border: 1px solid #334155;
}

/* Estilização da sua Imagem (Cadeado) */
