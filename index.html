<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherForge // Gerador de Senhas Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="img/unlock (3).svg.webp" alt="cadeado fechado" class="icone-cadeado">
            <h2 class="titulo-principal">CipherForge</h2>
            <h3 class="titulo-secundario">Gere instantaneamente credenciais com criptografia militar</h3>
        </div>

        <div class="display-section">
            <div class="password-box">
                <input type="password" id="password-display" readonly placeholder="Aguardando geração...">
                <div class="box-actions">
                    <button id="btn-toggle" title="Mostrar/Ocultar Senha">👁️</button>
                    <button id="btn-copy" title="Copiar para área de transferência">📋</button>
                </div>
            </div>
            
            <div class="strength-container">
                <div class="strength-meter">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
                <span id="strength-text">Força: Segurança Nula</span>
            </div>
        </div>

        <div class="settings">
            <div class="setting-item">
                <div class="slider-info">
                    <label for="length-slider">Entropia do Comprimento</label>
                    <span id="length-val">16</span>
                </div>
                <input type="range" id="length-slider" min="8" max="64" value="16">
            </div>

            <div class="options-grid">
                <label class="option-card">
                    <input type="checkbox" id="include-uppercase" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">A-Z (Maiúsculas)</span>
                </label>
                <label class="option-card">
                    <input type="checkbox" id="include-lowercase" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">a-z (Minúsculas)</span>
                </label>
                <label class="option-card">
                    <input type="checkbox" id="include-numbers" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">0-9 (Alfanuméricos)</span>
                </label>
                <label class="option-card">
                    <input type="checkbox" id="include-symbols" checked>
                    <span class="custom-check"></span>
                    <span class="label-text">!@# (Símbolos)</span>
                </label>
            </div>
        </div>

        <button id="btn-generate" class="btn-primary">GERAR CREDENCIAL</button>

        <div class="history-section">
            <h4>Sessões Recentes</h4>
            <ul id="history-list">
                </ul>
        </div>
    </div>

    <div id="toast-notification" class="toast">Copiado com sucesso!</div>

    <script src="script.js"></script>
</body>
</html>
